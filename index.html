<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toth Construction — Job Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --charcoal:#3E3E3E;
  --charcoal-deep:#2E2E2E;
  --charcoal-ink:#26272B;
  --blue:#29ABE2;
  --blue-dark:#1B8AC0;
  --blue-tint:#E4F4FC;
  --surface:#F4F5F6;
  --card:#FFFFFF;
  --line:#E2E4E7;
  --muted:#75787F;
  --success:#2FB56B;
  --success-tint:#E6F7EE;
  --amber:#F0A422;
  --amber-tint:#FDF3E0;
  --danger:#E5484D;
  --danger-tint:#FCE9EA;
  --radius:14px;
  --disp:"Barlow Condensed","Arial Narrow",sans-serif;
  --body:"Barlow",-apple-system,"Segoe UI",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);background:var(--charcoal-deep);color:var(--charcoal-ink);font-size:16px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px}

/* ---------- app shell ---------- */
#app{width:100%;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--surface);display:flex;flex-direction:column;position:relative}
@media(min-width:720px){
  .scroll{padding:24px max(24px, calc((100% - 880px)/2)) 110px}
  .gate-btn{max-width:380px}
  .bnav{justify-content:center}
  .bnav button{max-width:130px}
  .sheet{max-width:680px;margin:0 auto}
  .topbar{padding:14px max(24px, calc((100% - 880px)/2))}
}

.screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;padding:16px 16px 96px;-webkit-overflow-scrolling:touch}

/* ---------- top bar ---------- */
.topbar{background:var(--charcoal);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.topbar img{width:44px;height:44px;border-radius:0}
.topbar .tb-title{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.topbar .tb-sub{font-size:12px;color:#B9BCC2;letter-spacing:.14em;text-transform:uppercase;margin-top:3px;font-weight:600}
.tb-exit{margin-left:auto;color:#C6C9CE;font-size:13px;font-weight:600;padding:8px 10px;border:1px solid #5A5B60;border-radius:9px}
.tb-exit:active{background:#4A4B50}
.tb-back{width:38px;height:38px;border-radius:11px;border:1px solid #5A5B60;color:#fff;font-size:20px;font-weight:700;flex-shrink:0;line-height:1}
.tb-back:active{background:#4A4B50}

/* ---------- roof motif ---------- */
.roof{display:inline-block;vertical-align:middle}

/* ---------- role select ---------- */
.gate{flex:1;background:var(--charcoal);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.gate img{width:180px;height:180px;border-radius:0;margin-bottom:14px;box-shadow:none}
.gate h1{font-family:var(--disp);font-weight:700;font-size:34px;letter-spacing:.08em;color:#fff;text-transform:uppercase;line-height:1.05}
.gate h1 span{color:var(--blue)}
.gate .g-sub{color:#A7AAB1;font-size:14px;margin:10px 0 34px;letter-spacing:.02em}
.gate-btn{width:100%;max-width:320px;display:flex;align-items:center;gap:14px;background:#4A4B51;border:1px solid #5B5C62;border-radius:16px;padding:18px;margin-bottom:14px;text-align:left;color:#fff;transition:transform .08s}
.gate-btn:active{transform:scale(.97)}
.gate-btn .gb-icon{width:48px;height:48px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gate-btn.emp .gb-icon{background:#606167}
.gate-btn .gb-t{font-family:var(--disp);font-size:20px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.gate-btn .gb-d{font-size:13px;color:#B4B7BD;margin-top:2px}
.gate-foot{color:#7E8188;font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-top:26px;font-weight:600}

/* ---------- employer PIN gate ---------- */
.pin-dots{display:flex;gap:14px;justify-content:center;margin:22px 0 26px}
.pin-dots span{width:16px;height:16px;border-radius:50%;border:2px solid #6A6B70;transition:background .12s,border-color .12s}
.pin-dots span.fill{background:var(--blue);border-color:var(--blue)}
.pin-dots.err span{border-color:var(--danger);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}
@media(prefers-reduced-motion:reduce){.pin-dots.err span{animation:none}}
.pinpad{display:grid;grid-template-columns:repeat(3,76px);gap:12px;justify-content:center}
.pinpad button{width:76px;height:64px;border-radius:16px;background:#4A4B51;border:1px solid #5B5C62;color:#fff;font-family:var(--disp);font-size:26px;font-weight:700;transition:transform .06s}
.pinpad button:active{transform:scale(.94);background:#56575D}
.pinpad button.soft{background:transparent;border-color:transparent;font-size:15px;font-family:var(--body);font-weight:600;color:#B4B7BD}
.pin-hint{color:#8B8E95;font-size:12px;margin-top:20px}

/* ---------- bottom nav ---------- */
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--charcoal);display:flex;padding:6px 6px calc(10px + env(safe-area-inset-bottom));z-index:30}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;color:#9EA1A8;border-radius:10px;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.bnav button svg{width:22px;height:22px}
.bnav button.on{color:var(--blue)}

/* ---------- shared components ---------- */
.eyebrow{display:flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--charcoal);margin:20px 2px 10px}
.eyebrow:first-child{margin-top:4px}
.eyebrow .count{margin-left:auto;font-family:var(--body);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0;text-transform:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card:active{border-color:#CBD0D6}
.chip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:999px}
.chip.blue{background:var(--blue-tint);color:var(--blue-dark)}
.chip.green{background:var(--success-tint);color:#1E8A4E}
.chip.amber{background:var(--amber-tint);color:#B57408}
.chip.grey{background:#ECEDEF;color:var(--muted)}
.chip.red{background:var(--danger-tint);color:var(--danger)}
.muted{color:var(--muted);font-size:13px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}

.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:var(--charcoal);border-radius:var(--radius);padding:13px 12px;color:#fff}
.stat .s-n{font-family:var(--disp);font-size:30px;font-weight:700;line-height:1;color:var(--blue)}
.stat .s-l{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#B4B7BD;margin-top:5px;font-weight:600}

.pulse{width:9px;height:9px;border-radius:50%;background:var(--success);position:relative;flex-shrink:0}
.pulse::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--success);opacity:.5;animation:pl 1.6s ease-out infinite}
@keyframes pl{0%{transform:scale(.5);opacity:.7}100%{transform:scale(1.25);opacity:0}}
@media(prefers-reduced-motion:reduce){.pulse::after{animation:none;opacity:0}}

.avatar{width:40px;height:40px;border-radius:11px;background:var(--charcoal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.03em;flex-shrink:0}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:13px;font-weight:700;font-size:15.5px;letter-spacing:.02em;transition:transform .08s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(41,171,226,.35)}
.btn.dark{background:var(--charcoal);color:#fff}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--charcoal-ink)}
.btn.danger{background:var(--danger);color:#fff}
.btn.sm{width:auto;padding:9px 14px;font-size:13.5px;border-radius:10px}
.btn:disabled{opacity:.45;transform:none}

/* forms */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;background:#fff;color:var(--charcoal-ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--blue);outline-offset:-1px;border-color:var(--blue)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff}
.check-row input{width:20px;height:20px;accent-color:var(--blue)}
.check-row.sel{border-color:var(--blue);background:var(--blue-tint)}

/* sheet / modal */
.sheet-bg{position:absolute;inset:0;background:rgba(30,31,34,.55);z-index:40;display:flex;align-items:flex-end;animation:fdin .18s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);width:100%;max-height:88%;border-radius:20px 20px 0 0;display:flex;flex-direction:column;animation:slup .22s ease}
@keyframes slup{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
@media(prefers-reduced-motion:reduce){.sheet,.sheet-bg{animation:none}}
.sheet-head{display:flex;align-items:center;padding:16px 16px 10px}
.sheet-head h3{font-family:var(--disp);font-size:21px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.sheet-x{margin-left:auto;width:34px;height:34px;border-radius:50%;background:#E7E8EA;font-size:16px;font-weight:700;color:var(--charcoal)}
.sheet-body{overflow-y:auto;padding:6px 16px 24px}

/* sign on */
.big-clock{font-family:var(--disp);font-weight:700;font-size:56px;letter-spacing:.02em;line-height:1;text-align:center;color:var(--charcoal-ink);font-variant-numeric:tabular-nums}
.signon-hero{background:var(--charcoal);border-radius:18px;padding:24px 18px;text-align:center;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.signon-hero .sh-roof{position:absolute;right:-30px;top:-24px;opacity:.14}
.job-pick{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:9px}
.job-pick:active{border-color:var(--blue)}
.job-pick .jp-bar{width:5px;align-self:stretch;border-radius:4px;background:var(--blue);flex-shrink:0}

/* calendar */
.cal-head{display:flex;align-items:center;margin-bottom:10px}
.cal-head h3{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex:1;text-align:center}
.cal-nav{width:38px;height:38px;border-radius:11px;background:#fff;border:1.5px solid var(--line);font-size:17px;color:var(--charcoal)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cal-cell{background:#fff;border:1px solid var(--line);border-radius:9px;min-height:52px;padding:4px;font-size:12px;position:relative;cursor:pointer}
.cal-cell.dim{opacity:.35}
.cal-cell.today .cd{background:var(--blue);color:#fff}
.cal-cell.sel{outline:2px solid var(--blue);outline-offset:-2px}
.cal-cell .cd{width:20px;height:20px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:600}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.cal-bar{height:5px;border-radius:3px;flex:1 1 100%;min-width:0}
.cal-step{width:6px;height:6px;border-radius:50%;background:var(--amber)}

/* quote items — spreadsheet grid */
.qsheet{background:#fff;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
.qhead{display:grid;grid-template-columns:30px 1fr 34px;background:var(--charcoal);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 0;align-items:center}
.qhead span:nth-child(2){padding-left:4px}
.qrow{display:grid;grid-template-columns:30px 1fr 34px;border-top:1px solid var(--line);background:#fff;align-items:stretch}
.qrow.dragging{background:var(--blue-tint);box-shadow:inset 0 0 0 2px var(--blue);position:relative;z-index:5}
.q-handle{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:grab;touch-action:none;color:#B4B7BD;border-right:1px solid var(--line);user-select:none;-webkit-user-select:none}
.q-handle:active{cursor:grabbing;color:var(--blue)}
.q-handle i{width:14px;height:2px;border-radius:2px;background:currentColor;display:block}
.q-main{padding:8px 8px 8px 4px;min-width:0}
.q-main input,.q-main select{padding:8px;border:1px solid var(--line);border-radius:8px;width:100%;font-size:14px;background:#FBFCFD}
.q-main input:focus,.q-main select:focus{outline:2px solid var(--blue);outline-offset:-1px}
.q-desc{margin-bottom:6px}
.q-sub{display:grid;grid-template-columns:1.15fr .62fr .62fr .85fr;gap:5px;align-items:center}
.q-amt{text-align:right;font-weight:700;font-size:13.5px;padding-top:6px;font-variant-numeric:tabular-nums}
.q-amt small{display:block;font-weight:600;color:var(--muted);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase}
.q-side{display:flex;flex-direction:column;border-left:1px solid var(--line)}
.q-side button{flex:1;color:var(--muted);font-size:14px}
.q-side button:first-child{border-bottom:1px solid var(--line)}
.q-side button.q-x{color:var(--danger)}
.dropzone{border:2px dashed #BFD9E8;border-radius:var(--radius);background:var(--blue-tint);padding:16px;text-align:center;color:var(--blue-dark);font-size:13.5px;font-weight:600;margin-bottom:10px}
.dropzone.hot{border-color:var(--blue);background:#CDE9F8}
.dropzone .dz-sub{font-weight:400;color:var(--muted);font-size:12px;margin-top:3px}

/* signed-on worker highlight */
.card.onsite{border-color:var(--success);background:var(--success-tint);box-shadow:0 0 0 1px var(--success)}
.card.onsite .w-name{color:#1E8A4E}
.card.onsite .avatar{background:var(--success)}

/* fit-for-work photo */
.cam-wrap{position:relative;border-radius:16px;overflow:hidden;background:#1E1F22;display:none;margin-bottom:10px}
.cam-wrap.live{display:block}
.cam-wrap video{width:100%;display:block;max-height:320px;object-fit:cover;transform:scaleX(-1)}
.cam-cap{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:62px;height:62px;border-radius:50%;background:#fff;border:5px solid var(--blue);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.cam-cap:active{transform:translateX(-50%) scale(.92)}
.cam-note{position:absolute;top:10px;left:0;right:0;text-align:center;color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.04em;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.photo-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border:2px dashed #BFD9E8;border-radius:13px;background:var(--blue-tint);color:var(--blue-dark);font-weight:700;font-size:14.5px}
.photo-btn.done{border-style:solid;border-color:var(--success);background:var(--success-tint);color:#1E8A4E}
.fit-preview{width:86px;height:86px;border-radius:14px;object-fit:cover;border:3px solid var(--success);display:block;margin:10px auto 0}
.decl{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px;margin:12px 0;font-size:13.5px;line-height:1.4}
.decl input{width:22px;height:22px;accent-color:var(--success);flex-shrink:0;margin-top:1px}
.decl.ok{border-color:var(--success);background:var(--success-tint)}
.avatar.photo{background-size:cover;background-position:center;color:transparent}
.avatar.lg{width:54px;height:54px;border-radius:13px;border:2px solid var(--success);cursor:pointer}
.fit-full{width:100%;max-width:340px;border-radius:16px;display:block;margin:0 auto 12px;border:3px solid var(--success)}
.appr-actions{display:flex;gap:8px;margin-top:10px}

.totals{background:var(--charcoal);color:#fff;border-radius:var(--radius);padding:14px;margin-top:12px}
.totals .t-row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:#C6C9CE}
.totals .t-row.grand{border-top:1px solid #5A5B60;margin-top:8px;padding-top:10px;color:#fff;font-size:17px;font-weight:700}
.totals .t-row.grand b{font-family:var(--disp);font-size:26px;color:var(--blue);letter-spacing:.02em}

/* toast */
#toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%);background:var(--charcoal-ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1}

/* notif */
.notif{display:flex;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);font-size:13.5px}
.notif:last-child{border-bottom:none}
.notif .n-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0}
.notif time{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}

.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty svg{opacity:.35;margin-bottom:10px}
.empty .e-t{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--charcoal);margin-bottom:4px}

.step-line{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13.5px;border-bottom:1px dashed var(--line)}
.step-line:last-child{border-bottom:none}
.step-tick{width:20px;height:20px;border-radius:6px;border:2px solid #C9CCD1;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800}
.step-tick.done{background:var(--success);border-color:var(--success)}
.fab-space{height:8px}
a{color:var(--blue-dark)}
:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
</style>
</head>
<body>
<div id="app" role="application"></div>

function todayISO(d){ const x = d||new Date(); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function money(n){ return "$" + (Number(n)||0).toLocaleString("en-NZ",{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString("en-NZ",{day:"numeric",month:"short"}); }
function fmtDateLong(iso){ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString("en-NZ",{weekday:"short",day:"numeric",month:"short",year:"numeric"}); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString("en-NZ",{hour:"numeric",minute:"2-digit"}); }
function durText(min){ const h=Math.floor(min/60), m=Math.round(min%60); return (h?h+"h ":"")+m+"m"; }
function initials(name){ return name.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase(); }

let lastPayload="";
async function loadState(){
  try{
    if(window.storage){
      const r = await window.storage.get("tc:data:v2", true);
      if(r && r.value){ S = JSON.parse(r.value); lastPayload=r.value; return; }
    }
  }catch(e){ /* key missing or storage unavailable */ }
  if(memStore["tc:data:v2"]){ S = JSON.parse(memStore["tc:data:v2"]); return; }
  S = seed();
  await saveState();
}
async function saveState(){
  // keep photos only on the 40 most recent entries so storage stays lean
  const recent=[...S.timesheets].sort((a,b)=>b.start-a.start).slice(40);
  recent.forEach(t=>{ if(t.photo) delete t.photo; });
  const payload = JSON.stringify(S);
  try{
    if(window.storage){ await window.storage.set("tc:data:v2", payload, true); lastPayload=payload; return; }
  }catch(e){ console.error("storage save failed", e); }
  memStore["tc:data:v2"] = payload;
}
async function refreshState(){
  // pull latest shared data so sign-ons from other devices appear live
  if(!window.storage) return;
  if(document.getElementById("sheetBg")) return; // don't clobber an open form
  try{
    const r = await window.storage.get("tc:data:v2", true);
    if(r && r.value && r.value!==lastPayload){
      S = JSON.parse(r.value); lastPayload=r.value;
      render();
    }
  }catch(e){ /* ignore transient errors */ }
}

function seed(){
  return {
    workers:[],
    jobs:[],

    sessions:[],

    counters:{quote:1001, job:1001},

  };
}

function jobStatusChip(st){

}
function quoteTotals(q){
  const sub = q.items.reduce((a,i)=>a+(Number(i.qty)||0)*(Number(i.rate)||0),0);
  return {sub, gst:sub*GST, total:sub*(1+GST)};
}

    <div class="pinpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinKey('${n}')">${n}</button>`).join("")}
      <button class="soft" onclick="exitPortal()">Back</button>
      <button onclick="pinKey('0')">0</button>
      <button class="soft" onclick="pinKey('del')" aria-label="Delete">⌫</button>
    </div>
    <div class="pin-hint">Office use only — the code can be changed on the Dashboard</div>
  </div></div>`;
}
function pinKey(k){
  const dots=document.getElementById("pinDots");
  dots.classList.remove("err");
  if(k==="del"){ pinBuf=pinBuf.slice(0,-1); }
  else if(pinBuf.length<4){ pinBuf+=k; }
  [...dots.children].forEach((d,i)=>d.classList.toggle("fill", i<pinBuf.length));
  if(pinBuf.length===4){
    if(pinBuf===companyPin()){
      route.portal="employer"; route.tab="dash"; render();
    } else {
      dots.classList.add("err");
      setTimeout(()=>{ pinBuf=""; [...dots.children].forEach(d=>d.classList.remove("fill")); },380);
    }
  }
}
function openPinChange(){
  sheet("Access code", `
    <div class="field"><label>Current code</label><input id="pc-old" type="password" inputmode="numeric" maxlength="4" placeholder="••••"></div>

}
async function savePin(){
  const o=document.getElementById("pc-old").value, n=document.getElementById("pc-new").value, n2=document.getElementById("pc-new2").value;
  if(o!==companyPin()){ toast("Current code is wrong"); return; }
  if(!/^\d{4}$/.test(n)){ toast("New code must be 4 digits"); return; }

}

async function toggleStep(jid,sid){
  const j=jobById(jid); const s=j.steps.find(x=>x.id===sid); s.done=!s.done;

async function toggleAssign(jid,wid,on){
  const j=jobById(jid); const w=workerById(wid);
  if(on && !j.assigned.includes(wid)){
    j.assigned.push(wid);
    S.notifications.push({id:uid(),ts:Date.now(),text:`${w.name} allocated to ${j.title}`,workerIds:[wid]});
    toast(`${w.name} allocated — they'll see it on sign-on`);
  } else if(!on){
    j.assigned=j.assigned.filter(x=>x!==wid);
    S.notifications.push({id:uid(),ts:Date.now(),text:`${w.name} removed from ${j.title}`,workerIds:[wid]});
  }
  await saveState(); openJobDetail(jid);
}

/* ---- Calendar ---- */
function empCal(){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  const monthName=calCursor.toLocaleDateString("en-NZ",{month:"long",year:"numeric"});
  const first=new Date(y,m,1);
  let startDow=(first.getDay()+6)%7; // Monday start
  const daysIn=new Date(y,m+1,0).getDate();
  const cells=[];
  const prevDays=new Date(y,m,0).getDate();
  for(let i=startDow-1;i>=0;i--) cells.push({d:prevDays-i, dim:true, iso:null});
  for(let d=1;d<=daysIn;d++) cells.push({d, dim:false, iso:todayISO(new Date(y,m,d))});
  let nx=1; while(cells.length%7!==0) cells.push({d:nx++, dim:true, iso:null});
  const today=todayISO();
  const grid = cells.map(c=>{
    if(!c.iso) return `<div class="cal-cell dim"><span class="cd">${c.d}</span></div>`;
    const bars=S.jobs.filter(j=>j.start&&j.end&&c.iso>=j.start&&c.iso<=j.end);
    const steps=S.jobs.flatMap(j=>j.steps.filter(s=>s.date===c.iso));
    return `<div class="cal-cell ${c.iso===today?'today':''} ${calSel===c.iso?'sel':''}" onclick="selCalDay('${c.iso}')">
      <span class="cd">${c.d}</span>
      <div class="cal-dots">${bars.slice(0,3).map(j=>`<span class="cal-bar" style="background:${j.colour||'var(--blue)'}"></span>`).join("")}${steps.slice(0,3).map(()=>'<span class="cal-step"></span>').join("")}</div>
    </div>`;}).join("");
  const selIso = calSel || today;
  const dayJobs=S.jobs.filter(j=>j.start&&j.end&&selIso>=j.start&&selIso<=j.end);
  const daySteps=S.jobs.flatMap(j=>j.steps.filter(s=>s.date===selIso).map(s=>({s,j})));
  return `
    <div class="cal-head">
      <button class="cal-nav" onclick="moveCal(-1)" aria-label="Previous month">‹</button>
      <h3>${monthName}</h3>
      <button class="cal-nav" onclick="moveCal(1)" aria-label="Next month">›</button>
    </div>
    <div class="cal-grid">${["Mo","Tu","We","Th","Fr","Sa","Su"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}${grid}</div>
    <div class="eyebrow">${roofSVG(15,"var(--blue)")} ${fmtDateLong(selIso)}</div>
    ${dayJobs.length||daySteps.length ? `
      ${dayJobs.map(j=>`<div class="card row" onclick="openJobDetail('${j.id}')" role="button">
        <span style="width:5px;align-self:stretch;border-radius:4px;background:${j.colour||'var(--blue)'}"></span>
        <div class="grow"><b>${esc(j.title)}</b><div class="muted">${esc(j.client)} · ${j.assigned.length} crew</div></div>${jobStatusChip(j.status)}</div>`).join("")}
      ${daySteps.map(x=>`<div class="card row"><span class="cal-step" style="width:10px;height:10px"></span>
        <div class="grow"><b>${esc(x.s.name)}</b><div class="muted">${esc(x.j.title)}</div></div>${x.s.done?'<span class="chip green">Done</span>':'<span class="chip amber">Milestone</span>'}</div>`).join("")}`
      : `<div class="empty"><div class="e-t">Nothing on</div>No jobs or milestones on this day.</div>`}`;
}
function moveCal(n){ calCursor.setMonth(calCursor.getMonth()+n); calSel=null; render(); }
function selCalDay(iso){ calSel=iso; render(); document.getElementById("scr").scrollTop=99999; }

function qEdit(el){

  editQ.items[i][k] = (k==="qty"||k==="rate") ? Number(el.value)||0 : el.value;

  const amt=document.getElementById("amt-"+i);
  if(amt) amt.innerHTML=`<small>Amount</small>${money((Number(it.qty)||0)*(Number(it.rate)||0))}`;

}
function syncQItems(){
  document.querySelectorAll("#qf-items [data-i]").forEach(el=>{
    const i=Number(el.dataset.i), k=el.dataset.k;
    if(!editQ.items[i]) return;
    editQ.items[i][k] = (k==="qty"||k==="rate") ? Number(el.value)||0 : el.value;
  });
}
function redrawItems(){
  document.getElementById("qf-items").innerHTML=quoteItemsHTML();
  document.getElementById("qf-totals").innerHTML=totalsHTML(quoteTotals(editQ));
}
function addQItem(){ syncQItems(); editQ.items.push({desc:"",category:"Labour",qty:1,unit:"hrs",rate:0}); redrawItems(); }
function dupQItem(i){ syncQItems(); editQ.items.splice(i+1,0,JSON.parse(JSON.stringify(editQ.items[i]))); redrawItems(); toast("Line duplicated"); }
function delQItem(i){ syncQItems(); editQ.items.splice(i,1); if(!editQ.items.length) editQ.items.push({desc:"",category:"Labour",qty:1,unit:"hrs",rate:0}); redrawItems(); }

/* drag to reorder (works with touch + mouse) */
let dragIdx=null;
function qDragStart(e,i){
  e.preventDefault();
  syncQItems();
  dragIdx=i;
  markDragRow();
  const move=(ev)=>{
    const el=document.elementFromPoint(ev.clientX,ev.clientY);
    const row=el && el.closest ? el.closest(".qrow") : null;
    if(!row) return;
    const over=Number(row.dataset.idx);
    if(over!==dragIdx && !Number.isNaN(over)){
      const [it]=editQ.items.splice(dragIdx,1);
      editQ.items.splice(over,0,it);
      dragIdx=over;
      redrawItems();
      markDragRow();
    }
  };
  const up=()=>{
    document.removeEventListener("pointermove",move);
    document.removeEventListener("pointerup",up);
    document.removeEventListener("pointercancel",up);
    dragIdx=null;
    redrawItems();
  };
  document.addEventListener("pointermove",move);
  document.addEventListener("pointerup",up);
  document.addEventListener("pointercancel",up);
}
function markDragRow(){
  document.querySelectorAll(".qrow").forEach(r=>r.classList.toggle("dragging", Number(r.dataset.idx)===dragIdx));
}
async function saveQuote(pdf){
  syncQItems();
  if(!editQ.client && !editQ.jobTitle){ toast("Add a client or job title first"); return; }
  if(editQ.id){ const i=S.quotes.findIndex(q=>q.id===editQ.id); S.quotes[i]=editQ; }
  else { editQ.id=uid(); S.counters.quote++; S.quotes.push(editQ); }
  await saveState();
  if(pdf){ makeQuotePDF(editQ); } else { closeSheet(); render(); toast("Quote saved"); }
}
async function deleteQuote(){
  if(!confirm("Delete this quote?")) return;
  S.quotes=S.quotes.filter(q=>q.id!==editQ.id); await saveState(); closeSheet(); render(); toast("Quote deleted");
}

/* ---- Excel quoting sheet import ---- */
async function importXlsx(file){
  if(!file) return;
  if(!/\.xlsx?$/i.test(file.name)){ toast("That's not an Excel file"); return; }
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const wsName=wb.SheetNames.includes("Quote")?"Quote":wb.SheetNames[0];
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{header:1,raw:true,defval:""});
    const q={id:null,number:"TC-Q-"+S.counters.quote,date:todayISO(),client:"",contact:"",email:"",siteAddress:"",jobTitle:"",validDays:30,status:"draft",notes:"",items:[]};
    const labelMap={"quote no":"number","client":"client","contact":"contact","email":"email","site":"siteAddress","project":"jobTitle","valid":"validDays"};
    let itemStart=-1;
    rows.forEach((r,ri)=>{
      if(itemStart<0 && r.some(c=>String(c).trim().toLowerCase()==="description")) itemStart=ri+1;
    });
    const headEnd = itemStart>=0 ? itemStart-1 : rows.length;
    rows.forEach((r,ri)=>{
      r.forEach((cell,ci)=>{
        const s=String(cell).trim().toLowerCase();
        if(!s) return;
        if(ri<headEnd){
          for(const key in labelMap){
            if(s===key || s.startsWith(key)){
              const val=r[ci+1];
              if(val!==undefined && String(val).trim()!==""){
                if(labelMap[key]==="validDays") q.validDays=Number(val)||30;
                else q[labelMap[key]]=String(val).trim();
              }
            }
          }
        }
        if(s.startsWith("notes")){
          const noteRow=rows[ri+1];
          if(noteRow){ const n=noteRow.find(v=>String(v).trim()!==""); if(n) q.notes=String(n).trim(); }
        }
      });
    });
    if(itemStart>=0){
      for(let ri=itemStart; ri<rows.length; ri++){
        const r=rows[ri];
        const desc=String(r[1]||"").trim();
        const lower=desc.toLowerCase();
        if(lower.startsWith("subtotal")||lower.startsWith("total")||lower.startsWith("gst")||lower.startsWith("summary")) break;
        if(!desc) continue;
        q.items.push({desc,category:String(r[2]||"Labour").trim()||"Labour",qty:Number(r[3])||0,unit:String(r[4]||"").trim(),rate:Number(r[5])||0});
      }
    }
    if(!q.items.length){ toast("No line items found — check it's the Toth quoting sheet"); return; }
    editQ=q;
    drawQuoteSheet();
    toast(`Imported ${q.items.length} line${q.items.length===1?"":"s"} — review & save`);
  }catch(err){
    console.error(err);
    toast("Couldn't read that file — try re-saving it as .xlsx");
  }
}

/* ---- PDF generation ---- */
function makeQuotePDF(q){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:"mm", format:"a4"});
    const W=210, MX=16;
    const charcoal=[63,64,69], blue=[41,171,226], grey=[117,120,127], line=[226,228,231];
    const t=quoteTotals(q);

    // Header band
    doc.setFillColor(...charcoal); doc.rect(0,0,W,40,"F");
    try{ doc.addImage(LOGO,"JPEG",MX,7,26,26); }catch(e){}
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(17);
    doc.text("TOTH CONSTRUCTION LIMITED", MX+31, 17);
    doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(190,193,198);
    doc.text(S.company.tag, MX+31, 23);
    doc.text(S.company.addr+"  ·  "+S.company.email+"  ·  "+S.company.phone, MX+31, 28);
    doc.setTextColor(...blue); doc.setFont("helvetica","bold"); doc.setFontSize(24);
    doc.text("QUOTE", W-MX, 20, {align:"right"});
    doc.setFontSize(10); doc.setTextColor(255,255,255);
    doc.text(q.number, W-MX, 27, {align:"right"});

    // Blue accent rule
    doc.setFillColor(...blue); doc.rect(0,40,W,1.6,"F");

    // Meta blocks
    let y=52;
    doc.setTextColor(...grey); doc.setFontSize(8.5); doc.setFont("helvetica","bold");
    doc.text("QUOTE FOR", MX, y); doc.text("DETAILS", W/2+6, y);
    doc.setDrawColor(...line); doc.line(MX,y+1.5,MX+70,y+1.5); doc.line(W/2+6,y+1.5,W-MX,y+1.5);
    doc.setTextColor(38,39,43); doc.setFontSize(10.5);
    let yl=y+7;
    doc.text(q.client||"—", MX, yl); doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
    if(q.contact){ yl+=5; doc.text("Attn: "+q.contact, MX, yl); }
    if(q.email){ yl+=5; doc.text(q.email, MX, yl); }
    if(q.siteAddress){ yl+=5; doc.text(doc.splitTextToSize("Site: "+q.siteAddress,72), MX, yl); }
    let yr=y+7; doc.setFontSize(9.5);
    const meta=[["Date", fmtDateLong(q.date)],["Project", q.jobTitle||"—"],["Valid for", q.validDays+" days"],["GST No.", S.company.gstNo]];
    meta.forEach(m=>{ doc.setFont("helvetica","bold"); doc.text(m[0], W/2+6, yr); doc.setFont("helvetica","normal"); doc.text(doc.splitTextToSize(String(m[1]), 55), W/2+34, yr); yr+=5.5; });
    y=Math.max(yl,yr)+10;

    // Items table header
    const cols={desc:MX, cat:MX+86, qty:MX+116, rate:MX+140, amt:W-MX};
    doc.setFillColor(...charcoal); doc.rect(MX-2,y-5,W-2*MX+4,8,"F");
    doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont("helvetica","bold");
    doc.text("DESCRIPTION",cols.desc,y); doc.text("CATEGORY",cols.cat,y);
    doc.text("QTY",cols.qty+8,y,{align:"right"}); doc.text("RATE",cols.rate+10,y,{align:"right"}); doc.text("AMOUNT",cols.amt,y,{align:"right"});
    y+=8;
    doc.setTextColor(38,39,43); doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
    q.items.forEach((it,idx)=>{
      const lines=doc.splitTextToSize(it.desc||"—", 82);
      const rowH=Math.max(lines.length*4.6, 7);
      if(y+rowH>250){ doc.addPage(); y=20; }
      if(idx%2===1){ doc.setFillColor(244,245,246); doc.rect(MX-2,y-4.5,W-2*MX+4,rowH+2,"F"); }
      doc.text(lines, cols.desc, y);
      doc.setTextColor(...grey); doc.text(it.category||"", cols.cat, y); doc.setTextColor(38,39,43);
      doc.text(String(it.qty)+" "+(it.unit||""), cols.qty+8, y, {align:"right"});
      doc.text(money(it.rate).replace("$",""), cols.rate+10, y, {align:"right"});
      doc.setFont("helvetica","bold");
      doc.text(money((Number(it.qty)||0)*(Number(it.rate)||0)), cols.amt, y, {align:"right"});
      doc.setFont("helvetica","normal");
      y+=rowH+2;
    });

    // Totals
    y+=4; if(y>240){ doc.addPage(); y=24; }
    const tx=W-MX-70;
    doc.setDrawColor(...line); doc.line(tx,y,W-MX,y); y+=6;
    doc.setFontSize(10);
    doc.text("Subtotal", tx, y); doc.text(money(t.sub), W-MX, y, {align:"right"}); y+=6;
    doc.text("GST 15%", tx, y); doc.text(money(t.gst), W-MX, y, {align:"right"}); y+=4;
    doc.setFillColor(...blue); doc.rect(tx-3,y-1,W-MX-tx+5,10,"F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(11.5);
    doc.text("TOTAL (INCL. GST)", tx, y+5.5); doc.text(money(t.total), W-MX-2, y+5.5, {align:"right"});
    y+=18;

    // Notes
    if(q.notes){
      if(y>250){ doc.addPage(); y=24; }
      doc.setTextColor(...grey); doc.setFontSize(8.5); doc.text("NOTES & EXCLUSIONS", MX, y);
      doc.setDrawColor(...line); doc.line(MX,y+1.5,W-MX,y+1.5); y+=7;
      doc.setTextColor(60,61,66); doc.setFont("helvetica","normal"); doc.setFontSize(9);
      const nl=doc.splitTextToSize(q.notes, W-2*MX);
      doc.text(nl, MX, y); y+=nl.length*4.4+8;
    }

    // Prepared by
    if(y>258){ doc.addPage(); y=24; }
    doc.setDrawColor(...line); doc.line(MX,y,MX+70,y); y+=5;
    doc.setTextColor(38,39,43); doc.setFont("helvetica","bold"); doc.setFontSize(9.5);
    doc.text("Prepared by "+S.company.director, MX, y); y+=4.5;
    doc.setFont("helvetica","normal"); doc.setTextColor(...grey); doc.setFontSize(8.5);
    doc.text(S.company.directorTitle, MX, y);

    // Footer
    doc.setFillColor(...charcoal); doc.rect(0,285,W,12,"F");
    doc.setTextColor(180,183,189); doc.setFontSize(8);
    doc.text("Toth Construction Limited · Auckland, New Zealand · This quote is valid for "+q.validDays+" days from the date of issue.", W/2, 292, {align:"center"});

    doc.save(q.number+" - "+(q.jobTitle||q.client||"Quote").replace(/[^\w\s-]/g,"")+".pdf");
    closeSheet(); render(); toast("PDF downloaded — ready to send");
  }catch(err){
    console.error(err);
    toast("Couldn't build the PDF — check your connection and try again");
  }
}

      </div>
      <button class="btn danger" style="padding:19px;font-size:17px" onclick="signOff()">Sign off & save hours</button>
      ${myNotifs.length?`<div class="eyebrow">${roofSVG(15,"var(--blue)")} Notices</div><div class="card">${myNotifs.map(n=>`<div class="notif"><span class="n-dot"></span><div>${esc(n.text)}<time>${fmtTime(n.ts)}</time></div></div>`).join("")}</div>`:""}`;
  }
  const myJobs=S.jobs.filter(j=>j.assigned.includes(wid) && j.status!=="complete");
  const otherJobs=S.jobs.filter(j=>!j.assigned.includes(wid) && j.status!=="complete");
  return `
    <div class="signon-hero">
      <span class="sh-roof">${roofSVG(150,"#29ABE2")}</span>
      <div class="big-clock" style="color:#fff">${new Date().toLocaleTimeString("en-NZ",{hour:"numeric",minute:"2-digit"})}</div>
      <div style="color:#B4B7BD;margin-top:8px;font-size:14px">${fmtDateLong(todayISO())}</div>
      <button onclick="backToWho()" style="margin-top:12px;color:#B4B7BD;font-size:13px;font-weight:600;text-decoration:underline;text-underline-offset:3px">Not ${esc(workerById(wid).name.split(" ")[0])}? Go back</button>
    </div>
    ${myNotifs.length?`<div class="card" style="border-color:var(--blue);background:var(--blue-tint)">${myNotifs.map(n=>`<div class="notif"><span class="n-dot"></span><div>${esc(n.text)}<time>${new Date(n.ts).toLocaleDateString("en-NZ",{day:"numeric",month:"short"})}</time></div></div>`).join("")}</div>`:""}
    <div class="eyebrow">${roofSVG(15,"var(--blue)")} Sign on to your job</div>
    ${myJobs.length? myJobs.map(j=>jobPickBtn(j,true)).join("") : `<div class="empty"><div class="e-t">No allocations yet</div>You haven't been allocated a job — pick one below or check with the office.</div>`}
    ${otherJobs.length?`<div class="eyebrow">Other jobs <span class="count">not allocated</span></div>${otherJobs.map(j=>jobPickBtn(j,false)).join("")}`:""}`;
}
function jobPickBtn(j,mine){
  return `<button class="job-pick" onclick="signOn('${j.id}')">
    <span class="jp-bar" style="background:${j.colour||'var(--blue)'}"></span>
    <span class="grow" style="text-align:left"><b style="font-size:15.5px">${esc(j.title)}</b>
    <div class="muted">${esc(j.site)}</div></span>
    <span class="chip ${mine?'blue':'grey'}">${mine?'Allocated':'Sign on'}</span>
  </button>`;
}
let pendingSignOn=null;
function signOn(jid){
  const now=new Date();
  pendingSignOn={jobId:jid, photo:null};
  const j=jobById(jid);
  const hhmm=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  sheet("Fit for work check", `
    <div class="card row"><span class="jp-bar" style="background:${j.colour||'var(--blue)'};width:5px;align-self:stretch;border-radius:4px"></span>
      <div class="grow"><b>${esc(j.title)}</b><div class="muted">${esc(j.site)}</div></div></div>
    <div class="eyebrow">1 · Take your photo</div>
    <div class="cam-wrap" id="camWrap">
      <div class="cam-note">Fit-for-work photo — face the camera</div>
      <video id="camVideo" autoplay playsinline muted></video>
      <button class="cam-cap" onclick="captureFit()" aria-label="Take photo"></button>
    </div>
    <button class="photo-btn" id="fitBtn" onclick="startFitCam()">📷 Open camera</button>
    <input type="file" id="fitPhotoInput" accept="image/*" capture="user" style="display:none" onchange="fitPhotoPicked(this)">
    <div id="fitPreview"></div>
    <div class="eyebrow">2 · Declaration</div>
    <label class="decl" id="declRow"><input type="checkbox" id="fitDecl" onchange="this.closest('.decl').classList.toggle('ok',this.checked);updateSignOnBtn()">
      <span><b>I confirm I am fit for work.</b> I am not fatigued and not impaired by drugs, alcohol or medication, and I will report any hazards to the site supervisor.</span></label>
    <div class="eyebrow">3 · Start time</div>
    <div class="field"><label>When did you actually start?</label><input type="time" id="fitStart" value="${hhmm}" onchange="startTimeChanged()"></div>
    <div class="muted" id="lateNote" style="display:none;margin:-4px 0 12px">⚠ Earlier than now — this entry will go to the office for approval when you sign off.</div>
    <button class="btn primary" id="signOnBtn" style="padding:17px" disabled onclick="confirmSignOn()">Sign on</button>
    <div class="fab-space"></div>`);
}
let fitStream=null;
async function startFitCam(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast("Camera not available here — using your device camera app");
    document.getElementById("fitPhotoInput").click();
    return;
  }
  try{
    fitStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:640}},audio:false});
    const v=document.getElementById("camVideo");
    v.srcObject=fitStream;
    document.getElementById("camWrap").classList.add("live");
    const btn=document.getElementById("fitBtn");
    btn.textContent="Camera is live — tap the button to capture";
    btn.style.display="none";
  }catch(err){
    console.error(err);
    toast("Camera blocked — using your device camera app instead");
    document.getElementById("fitPhotoInput").click();
  }
}
function captureFit(){
  const v=document.getElementById("camVideo");
  if(!v || !v.videoWidth){ toast("Camera's still warming up — try again"); return; }
  const max=480, sc=Math.min(1, max/Math.max(v.videoWidth,v.videoHeight));
  const cv=document.createElement("canvas");
  cv.width=Math.round(v.videoWidth*sc); cv.height=Math.round(v.videoHeight*sc);
  const ctx=cv.getContext("2d");
  ctx.translate(cv.width,0); ctx.scale(-1,1); // un-mirror so the saved photo reads naturally
  ctx.drawImage(v,0,0,cv.width,cv.height);
  pendingSignOn.photo=cv.toDataURL("image/jpeg",0.55);
  stopFitCam();
  const btn=document.getElementById("fitBtn");
  btn.style.display="flex";
  btn.classList.add("done");
  btn.innerHTML="✓ Photo taken — retake";
  document.getElementById("fitPreview").innerHTML=`<img class="fit-preview" src="${pendingSignOn.photo}" alt="Fit for work photo">`;
  updateSignOnBtn();
}
function stopFitCam(){
  if(fitStream){ fitStream.getTracks().forEach(t=>t.stop()); fitStream=null; }
  const wrap=document.getElementById("camWrap");
  if(wrap) wrap.classList.remove("live");
  const v=document.getElementById("camVideo");
  if(v) v.srcObject=null;
}
function fitPhotoPicked(input){
  const file=input.files && input.files[0];
  if(!file) return;
  const img=new Image();
  const reader=new FileReader();
  reader.onload=e=>{
    img.onload=()=>{
      const max=480, sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement("canvas");
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      pendingSignOn.photo=cv.toDataURL("image/jpeg",0.55);
      document.getElementById("fitBtn").classList.add("done");
      document.getElementById("fitBtn").innerHTML="✓ Photo taken — retake";
      document.getElementById("fitPreview").innerHTML=`<img class="fit-preview" src="${pendingSignOn.photo}" alt="Fit for work photo">`;
      updateSignOnBtn();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function updateSignOnBtn(){
  const ok = pendingSignOn && pendingSignOn.photo && document.getElementById("fitDecl").checked;
  document.getElementById("signOnBtn").disabled=!ok;
}
function chosenStartTs(){
  const v=document.getElementById("fitStart").value;
  if(!v) return Date.now();
  const [h,m]=v.split(":").map(Number);
  const d=new Date(); d.setHours(h,m,0,0);
  return Math.min(d.getTime(), Date.now());
}
function startTimeChanged(){
  const late = Date.now()-chosenStartTs() > 120000;
  document.getElementById("lateNote").style.display = late ? "block" : "none";
}
async function confirmSignOn(){
  if(!pendingSignOn || !pendingSignOn.photo || !document.getElementById("fitDecl").checked){ toast("Photo and declaration required"); return; }
  const start=chosenStartTs();
  const backdated = Date.now()-start > 120000;
  const w=workerById(route.workerId), j=jobById(pendingSignOn.jobId);
  S.sessions.push({workerId:route.workerId, jobId:pendingSignOn.jobId, start, photo:pendingSignOn.photo, backdated});
  S.notifications.push({id:uid(),ts:Date.now(),text:`${w.name} signed on — ${j.title}${backdated?" (backdated start, pending approval)":""}`,workerIds:[]});
  pendingSignOn=null;
  await saveState(); closeSheet(); render();
  toast(backdated ? "Signed on — backdated time needs office approval" : "Signed on — have a good one");
}
async function signOff(){
  const i=S.sessions.findIndex(s=>s.workerId===route.workerId);
  if(i<0) return;
  const sess=S.sessions[i];
  const mins=Math.max(1, Math.round((Date.now()-sess.start)/60000));
  const w=workerById(route.workerId), j=jobById(sess.jobId);
  S.timesheets.push({id:uid(),workerId:sess.workerId,jobId:sess.jobId,date:todayISO(),start:sess.start,end:Date.now(),minutes:mins,photo:sess.photo||null,pending:!!sess.backdated});
  S.sessions.splice(i,1);
  S.notifications.push({id:uid(),ts:Date.now(),text:`${w.name} signed off ${j?j.title:""} — ${durText(mins)}${sess.backdated?" (awaiting approval)":""}`,workerIds:[]});
  await saveState(); render();
  toast(sess.backdated ? `Signed off — ${durText(mins)} sent for approval` : `Signed off — ${durText(mins)} saved to timesheet`);
}
function startSignTick(){
  tick=setInterval(()=>{
    const sess=sessionFor(route.workerId);
    const el=document.getElementById("liveClock");
    if(sess&&el) el.textContent=durText(liveMinutes(sess));
  },15000);
}

function eeTimesheet(){
  const mine=S.timesheets.filter(t=>t.workerId===route.workerId).sort((a,b)=>b.start-a.start);
  const approved=mine.filter(t=>!t.pending && !t.declined);
  const weekAgo=Date.now()-6.048e8;
  const weekMin=approved.filter(t=>t.start>=weekAgo).reduce((a,t)=>a+t.minutes,0);
  const pendCount=mine.filter(t=>t.pending).length;
  const byDay={};
  mine.forEach(t=>{ (byDay[t.date]=byDay[t.date]||[]).push(t); });
  const days=Object.keys(byDay).sort().reverse();
  return `
    <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="stat"><div class="s-n">${(weekMin/60).toFixed(1)}</div><div class="s-l">Hrs · 7 days</div></div>
      <div class="stat"><div class="s-n">${approved.length}</div><div class="s-l">Approved</div></div>
      <div class="stat"><div class="s-n" style="color:${pendCount?'var(--amber)':'var(--blue)'}">${pendCount}</div><div class="s-l">Pending</div></div>
    </div>
    <button class="btn ghost" style="margin-top:10px" onclick="openMissedTime()">+ Forgot to sign on? Add missed time</button>
    <div class="eyebrow">${roofSVG(15,"var(--blue)")} My timesheet</div>
    ${days.length? days.map(d=>{
      const rows=byDay[d]; const tot=rows.filter(t=>!t.pending&&!t.declined).reduce((a,t)=>a+t.minutes,0);
      return `<div class="card">
        <div class="row" style="margin-bottom:6px"><b>${fmtDateLong(d)}</b><b style="margin-left:auto;font-family:var(--disp);font-size:18px">${durText(tot)}</b></div>
        ${rows.map(t=>{ const j=jobById(t.jobId);
          return `<div class="step-line"><span style="width:5px;height:22px;border-radius:3px;background:${j?j.colour:'#999'};flex-shrink:0"></span>
          <span class="grow">${esc(j?j.title:"(deleted job)")}${t.pending?' <span class="chip amber">Awaiting approval</span>':''}${t.declined?' <span class="chip red">Declined</span>':''}</span>
          <span class="muted">${fmtTime(t.start)}–${fmtTime(t.end)}</span><b style="min-width:52px;text-align:right;${t.declined?'text-decoration:line-through;color:var(--muted)':''}">${durText(t.minutes)}</b></div>`;}).join("")}
      </div>`;}).join("") :
      `<div class="empty">${icons.sheet.replace('currentColor','#9EA1A8').replace('<svg','<svg width="44" height="44"')}<div class="e-t">No hours yet</div>Sign on to a job and your hours land here automatically.</div>`}`;
}

function openMissedTime(){
  const activeJobs=S.jobs.filter(j=>j.status!=="complete");
  if(!activeJobs.length){ toast("No open jobs to log time against"); return; }
  sheet("Add missed time", `
    <div class="muted" style="margin-bottom:12px">For when you forgot to sign on. The office will review and approve it before it counts.</div>
    <div class="field"><label>Job</label><select id="mt-job">${activeJobs.map(j=>`<option value="${j.id}">${esc(j.title)}</option>`).join("")}</select></div>
    <div class="field"><label>Date</label><input type="date" id="mt-date" value="${todayISO()}" max="${todayISO()}"></div>
    <div class="f2">
      <div class="field"><label>Start</label><input type="time" id="mt-start" value="07:00"></div>
      <div class="field"><label>Finish</label><input type="time" id="mt-end" value="15:30"></div>
    </div>
    <button class="btn primary" onclick="saveMissedTime()">Submit for approval</button>
    <div class="fab-space"></div>`);
}
async function saveMissedTime(){
  const jid=document.getElementById("mt-job").value;
  const date=document.getElementById("mt-date").value;
  const s=document.getElementById("mt-start").value, e=document.getElementById("mt-end").value;
  if(!date||!s||!e){ toast("Fill in the date and times"); return; }
  const [sh,sm]=s.split(":").map(Number), [eh,em]=e.split(":").map(Number);
  const base=new Date(date+"T00:00:00");
  const start=new Date(base); start.setHours(sh,sm,0,0);
  const end=new Date(base); end.setHours(eh,em,0,0);
  if(end<=start){ toast("Finish must be after start"); return; }
  if(start.getTime()>Date.now()){ toast("Can't log time in the future"); return; }
  const mins=Math.round((end-start)/60000);
  const w=workerById(route.workerId), j=jobById(jid);
  S.timesheets.push({id:uid(),workerId:route.workerId,jobId:jid,date,start:start.getTime(),end:end.getTime(),minutes:mins,pending:true,manual:true});
  S.notifications.push({id:uid(),ts:Date.now(),text:`${w.name} submitted ${durText(mins)} on ${j.title} for approval`,workerIds:[]});
  await saveState(); closeSheet(); render(); toast(`${durText(mins)} submitted — awaiting office approval`);
}

function eeSchedule(){
  const wid=route.workerId;
  const mine=S.jobs.filter(j=>j.assigned.includes(wid) && j.status!=="complete").sort((a,b)=>(a.start||"").localeCompare(b.start||""));
  return `
    <div class="eyebrow">${roofSVG(15,"var(--blue)")} My upcoming jobs <span class="count">${mine.length}</span></div>
    ${mine.length? mine.map(j=>`<div class="card">
      <div class="row" style="align-items:flex-start"><span style="width:5px;align-self:stretch;border-radius:4px;background:${j.colour||'var(--blue)'}"></span>
        <div class="grow"><b style="font-size:16px">${esc(j.title)}</b><div class="muted">${esc(j.site)}</div>
        <div class="muted" style="margin-top:4px">${fmtDate(j.start)} → ${fmtDate(j.end)}</div></div>${jobStatusChip(j.status)}</div>
      ${j.steps.length?`<div style="margin-top:8px">${j.steps.map(s=>`<div class="step-line"><span class="step-tick ${s.done?'done':''}">${s.done?'✓':''}</span><span class="grow" style="${s.done?'color:var(--muted)':''}">${esc(s.name)}</span><span class="muted">${fmtDate(s.date)}</span></div>`).join("")}</div>`:""}
    </div>`).join("") :
    `<div class="empty">${icons.cal.replace('currentColor','#9EA1A8').replace('<svg','<svg width="44" height="44"')}<div class="e-t">Nothing scheduled</div>Jobs allocated to you by the office will show here.</div>`}`;
}

/* ================= SHEET (modal) ================= */
function sheet(title, bodyHTML){
  closeSheet();
  const bg=document.createElement("div");
  bg.className="sheet-bg"; bg.id="sheetBg";
  bg.innerHTML=`<div class="sheet" role="dialog" aria-label="${esc(title)}">
    <div class="sheet-head"><h3>${title}</h3><button class="sheet-x" onclick="closeSheet()" aria-label="Close">✕</button></div>
    <div class="sheet-body">${bodyHTML}</div></div>`;
  bg.addEventListener("click",e=>{ if(e.target===bg) closeSheet(); });
  $app.appendChild(bg);
}
function closeSheet(){ if(typeof stopFitCam==="function") stopFitCam(); const s=document.getElementById("sheetBg"); if(s) s.remove(); }

/* ================= BOOT ================= */
(async function(){
  $app.innerHTML=`<div class="gate">${roofSVG(70,"#29ABE2")}<div class="gate-foot" style="margin-top:16px">Loading…</div></div>`;
  await loadState();
  render();
})();
</script>
</body>
</html>
